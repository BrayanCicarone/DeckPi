<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Painel de Controle — Acesso</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="center-screen">
    <div class="card-auth">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/><circle cx="9" cy="7" r="2.5" fill="currentColor" stroke="currentColor"/><circle cx="15" cy="12" r="2.5" fill="currentColor" stroke="currentColor"/><circle cx="8" cy="17" r="2.5" fill="currentColor" stroke="currentColor"/></svg></div>
      <h1 id="title">Entrar</h1>
      <p id="subtitle">Digite seu PIN de 4 dígitos.</p>
      <div id="pad-slot"></div>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script src="pinpad.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const msg = $('msg');
    const slot = $('pad-slot');

    let mode = 'login'; // 'login' | 'create' | 'confirm'
    let firstPin = null;

    async function submitLogin(pin) {
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pin }),
        });
        const data = await r.json();
        if (r.ok && data.ok) {
          msg.className = 'msg ok';
          msg.textContent = 'Tudo certo!';
          location.href = '/';
        } else {
          fail(data.error || 'PIN inválido.');
        }
      } catch (e) {
        fail('Erro de conexão.');
      }
    }

    function fail(text) {
      msg.className = 'msg err';
      msg.textContent = text;
      pad.shake();
      if (mode === 'confirm') { mode = 'create'; firstPin = null; setTitle(); }
    }

    function setTitle() {
      if (mode === 'create') {
        $('title').textContent = 'Criar PIN';
        $('subtitle').textContent = 'Defina um PIN de 4 dígitos para proteger o painel.';
      } else if (mode === 'confirm') {
        $('title').textContent = 'Confirme o PIN';
        $('subtitle').textContent = 'Digite o mesmo PIN novamente.';
      } else {
        $('title').textContent = 'Entrar';
        $('subtitle').textContent = 'Digite seu PIN de 4 dígitos.';
      }
    }

    const pad = createPinPad({
      onSubmit: (pin) => {
        msg.className = 'msg';
        msg.textContent = '';
        if (mode === 'login') {
          submitLogin(pin);
        } else if (mode === 'create') {
          firstPin = pin;
          mode = 'confirm';
          setTitle();
          pad.reset();
        } else if (mode === 'confirm') {
          if (pin !== firstPin) {
            fail('PIN não confere. Tente de novo.');
          } else {
            submitLogin(pin);
          }
        }
      },
    });
    slot.appendChild(pad.el);

    async function init() {
      try {
        const r = await fetch('/api/auth/state');
        const s = await r.json();
        if (s.authenticated) { location.href = '/'; return; }
        mode = s.configured ? 'login' : 'create';
        setTitle();
      } catch (e) { /* segue mostrando o teclado */ }
    }

    init();
  </script>
</body>
</html>
