<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Painel de Controle — Acesso</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="center-screen">
    <form class="card-auth" id="form">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/><circle cx="9" cy="7" r="2.5" fill="currentColor" stroke="currentColor"/><circle cx="15" cy="12" r="2.5" fill="currentColor" stroke="currentColor"/><circle cx="8" cy="17" r="2.5" fill="currentColor" stroke="currentColor"/></svg></div>
      <h1 id="title">Entrar</h1>
      <p id="subtitle">Digite sua senha para acessar o painel.</p>
      <div class="field">
        <label for="password" id="pwd-label">Senha</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <div class="field hidden" id="confirm-field">
        <label for="confirm">Confirmar senha</label>
        <input type="password" id="confirm" autocomplete="new-password">
      </div>
      <button class="btn primary" type="submit" id="submit">Entrar</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let firstAccess = false;

    async function init() {
      try {
        const r = await fetch('/api/auth/state');
        const s = await r.json();
        if (s.authenticated) { location.href = '/'; return; }
        firstAccess = !s.configured;
        if (firstAccess) {
          $('title').textContent = 'Criar senha';
          $('subtitle').textContent = 'Primeiro acesso: defina uma senha para proteger o painel.';
          $('pwd-label').textContent = 'Nova senha';
          $('password').setAttribute('autocomplete', 'new-password');
          $('confirm-field').classList.remove('hidden');
          $('submit').textContent = 'Criar e entrar';
        }
      } catch (e) { /* segue mostrando o form */ }
    }

    $('form').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const msg = $('msg');
      msg.className = 'msg';
      msg.textContent = '';
      const pwd = $('password').value;
      if (firstAccess) {
        if (pwd.length < 4) { msg.className = 'msg err'; msg.textContent = 'Mínimo de 4 caracteres.'; return; }
        if (pwd !== $('confirm').value) { msg.className = 'msg err'; msg.textContent = 'As senhas não conferem.'; return; }
      }
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd }),
        });
        const data = await r.json();
        if (r.ok && data.ok) { location.href = '/'; }
        else { msg.className = 'msg err'; msg.textContent = data.error || 'Falha no acesso.'; }
      } catch (e) {
        msg.className = 'msg err';
        msg.textContent = 'Erro de conexão.';
      }
    });

    init();
  </script>
</body>
</html>
